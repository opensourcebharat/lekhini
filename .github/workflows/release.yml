name: release

# Triggered by the tags that scripts/release.sh pushes (vX.Y.Z). Builds
# installers on each OS and publishes them to a GitHub Release, then
# flips that release from draft to public once every OS has finished.
on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write # create the release and upload assets

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build:
    name: build (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [macos-latest, windows-latest, ubuntu-latest]
    env:
      # 'true' only when macOS signing secrets are configured — drives
      # whether we sign + notarize or produce a clean unsigned build.
      MAC_SIGN: ${{ secrets.CSC_LINK != '' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node 22
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm

      # Defensive: the runners ship Python 3.12, which dropped `distutils`
      # and breaks node-gyp if any native dependency ever needs rebuilding.
      # Pinning 3.11 (distutils still bundled) keeps electron-builder's
      # native rebuild step working. Harmless when there are no native deps.
      - name: Setup Python 3.11 (for node-gyp)
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: npm ci

      # Only when the signing secrets exist: export them so electron-builder
      # signs + notarizes. Skipped otherwise — so an empty CSC_LINK is never
      # passed (electron-builder misreads "" as a certificate path and fails).
      - name: Configure macOS signing
        if: runner.os == 'macOS' && env.MAC_SIGN == 'true'
        run: |
          {
            echo "CSC_LINK=${{ secrets.CSC_LINK }}"
            echo "CSC_KEY_PASSWORD=${{ secrets.CSC_KEY_PASSWORD }}"
            echo "APPLE_ID=${{ secrets.APPLE_ID }}"
            echo "APPLE_APP_SPECIFIC_PASSWORD=${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}"
            echo "APPLE_TEAM_ID=${{ secrets.APPLE_TEAM_ID }}"
          } >> "$GITHUB_ENV"

      # Make an unsigned macOS release impossible to miss: downloads of
      # unsigned builds are blocked by Gatekeeper ("Apple could not
      # verify…" / "damaged and can't be opened"), so warn loudly in the
      # run summary until the signing secrets are configured.
      - name: Warn if building unsigned macOS installers
        if: runner.os == 'macOS' && env.MAC_SIGN != 'true'
        run: |
          echo "::warning title=Unsigned macOS build::CSC_LINK is not configured — this release's macOS installers will be UNSIGNED and Gatekeeper will block them for users. See RELEASING.md → 'macOS signing & notarization'."
          {
            echo "## ⚠️ Unsigned macOS build"
            echo "No signing secrets configured (\`CSC_LINK\` missing)."
            echo "Users will see **'Apple could not verify this app is free of malware'** or **'damaged and can't be opened'**."
            echo "Set up signing per \`RELEASING.md\` → *macOS signing & notarization*."
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Build and publish to the draft release
        run: npm run release:ci
        env:
          # Lets electron-builder create/upload to the GitHub Release.
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Unsigned (no secrets) → force-disable identity discovery so the
          # macOS build completes cleanly instead of hunting for a missing
          # cert. Flips to 'true' automatically once signing secrets exist.
          CSC_IDENTITY_AUTO_DISCOVERY: ${{ env.MAC_SIGN }}

  publish:
    name: publish release
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      # All OS builds succeeded and uploaded their assets to the draft
      # release — flip it public and mark it the latest.
      - name: Promote draft to published
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh release edit "${GITHUB_REF_NAME}" --repo "${GITHUB_REPOSITORY}" --draft=false --latest
